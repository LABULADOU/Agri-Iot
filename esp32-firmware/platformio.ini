[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    knolleary/PubSubClient
    links2004/WebSockets
    bblanchon/ArduinoJson
    adafruit/DHT sensor library
monitor_speed = 115200
board_build.flash_mode = dio

[env:esp32dev-sub]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -DSUB_NODE
lib_deps =
    bblanchon/ArduinoJson
    adafruit/DHT sensor library
monitor_speed = 115200
board_build.flash_mode = dio
