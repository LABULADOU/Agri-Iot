name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
    paths:
      - 'esp32-firmware/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'esp32-firmware/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: 构建固件
        run: |
          cd esp32-firmware
          pio run -e esp32dev

      - name: 上传固件产物
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware-bin
          path: esp32-firmware/.pio/build/esp32dev/firmware.bin
          if-no-files-found: error

      - name: 显示固件信息
        run: |
          BIN="esp32-firmware/.pio/build/esp32dev/firmware.bin"
          echo "固件大小: $(du -h "$BIN" | cut -f1)"
          echo "MD5: $(md5sum "$BIN" | cut -d' ' -f1)"
